name: Weekly SIGNAL Briefing

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  generate-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate weekly briefing
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python generate_briefing.py

      - name: Commit and push updated briefing
        run: |
          git config --global user.name "SIGNAL Bot"
          git config --global user.email "signal-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Weekly briefing update - $(date +'%Y-%m-%d')"
          git push

      - name: Send WeChat notification via Server酱
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          GITHUB_REPO: ${{ github.repository }}
        run: python notify_wechat.py
